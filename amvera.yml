meta:
  environment: nodejs
  toolchain:
    name: npm
    version: "20"
build:
  skip: false
  additionalCommands: npx prisma generate
  artifacts:
    "*": /
run:
  scriptName: server.js
  scriptArguments: null
  nodeArguments: null
  command: DATABASE_URL="file:/data/dev.db" npx prisma db push && node server.js
  persistenceMount: /data
  containerPort: "5000"
